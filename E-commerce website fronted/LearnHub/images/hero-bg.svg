<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative shapes -->
  <!-- Circle 1 -->
  <circle cx="100" cy="50" r="80" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Circle 2 -->
  <circle cx="1100" cy="550" r="100" fill="#10b981" opacity="0.1"/>
  
  <!-- Rectangle 1 -->
  <rect x="850" y="50" width="200" height="150" fill="#ec4899" opacity="0.05" rx="10"/>
  
  <!-- Rectangle 2 -->
  <rect x="50" y="400" width="180" height="140" fill="#f59e0b" opacity="0.05" rx="10"/>
  
  <!-- Polygonal shapes -->
  <polygon points="600,100 650,150 600,200 550,150" fill="white" opacity="0.03"/>
  
  <!-- Grid pattern -->
  <g stroke="white" stroke-width="1" opacity="0.05">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
  </g>
  
  <!-- Floating dots -->
  <circle cx="150" cy="120" r="4" fill="white" opacity="0.4"/>
  <circle cx="300" cy="250" r="3" fill="white" opacity="0.3"/>
  <circle cx="450" cy="180" r="5" fill="white" opacity="0.2"/>
  <circle cx="700" cy="380" r="4" fill="white" opacity="0.35"/>
  <circle cx="950" cy="220" r="3" fill="white" opacity="0.25"/>
  <circle cx="1050" cy="450" r="5" fill="white" opacity="0.3"/>
</svg>
