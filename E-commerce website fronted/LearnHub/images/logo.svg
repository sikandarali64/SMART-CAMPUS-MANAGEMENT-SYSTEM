<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#5b21b6" opacity="0.2"/>
  
  <!-- Book/Learning icon -->
  <g transform="translate(100, 100)">
    <!-- Left book page -->
    <path d="M -40 -30 L -20 -30 L -20 50 L -40 50 Z" fill="#5b21b6" stroke="#5b21b6" stroke-width="2"/>
    
    <!-- Right book page -->
    <path d="M 20 -30 L 40 -30 L 40 50 L 20 50 Z" fill="#ec4899" stroke="#ec4899" stroke-width="2"/>
    
    <!-- Center spine -->
    <line x1="-20" y1="-30" x2="-20" y2="50" stroke="#5b21b6" stroke-width="2"/>
    <line x1="20" y1="-30" x2="20" y2="50" stroke="#ec4899" stroke-width="2"/>
    
    <!-- Lines on left page -->
    <line x1="-35" y1="-10" x2="-25" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="-35" y1="5" x2="-25" y2="5" stroke="white" stroke-width="2"/>
    <line x1="-35" y1="20" x2="-25" y2="20" stroke="white" stroke-width="2"/>
    <line x1="-35" y1="35" x2="-25" y2="35" stroke="white" stroke-width="2"/>
    
    <!-- Lines on right page -->
    <line x1="25" y1="-10" x2="35" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="25" y1="5" x2="35" y2="5" stroke="white" stroke-width="2"/>
    <line x1="25" y1="20" x2="35" y2="20" stroke="white" stroke-width="2"/>
    <line x1="25" y1="35" x2="35" y2="35" stroke="white" stroke-width="2"/>
  </g>
</svg>
