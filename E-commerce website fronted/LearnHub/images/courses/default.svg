<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="courseGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#courseGrad1)"/>
  
  <!-- Code brackets -->
  <g stroke="white" stroke-width="8" fill="none" stroke-linecap="round">
    <polyline points="80,80 60,150 80,220"/>
    <polyline points="220,80 240,150 220,220"/>
  </g>
  
  <!-- Center line -->
  <line x1="150" y1="100" x2="150" y2="200" stroke="white" stroke-width="4" opacity="0.6"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="120" r="8" fill="white" opacity="0.4"/>
  <circle cx="150" cy="130" r="6" fill="white" opacity="0.3"/>
  <circle cx="200" cy="140" r="8" fill="white" opacity="0.4"/>
  
  <!-- Text label -->
  <text x="150" y="260" font-family="Arial" font-size="16" fill="white" text-anchor="middle" opacity="0.7">Web Development</text>
</svg>
