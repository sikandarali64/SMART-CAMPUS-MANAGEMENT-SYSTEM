<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="courseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#courseGrad2)"/>
  
  <!-- React/UI circles -->
  <circle cx="150" cy="150" r="60" stroke="white" stroke-width="6" fill="none" opacity="0.9"/>
  <circle cx="150" cy="150" r="45" stroke="white" stroke-width="4" fill="none" opacity="0.6"/>
  
  <!-- Nodes -->
  <circle cx="150" cy="90" r="10" fill="white"/>
  <circle cx="210" cy="180" r="10" fill="white"/>
  <circle cx="90" cy="180" r="10" fill="white"/>
  <circle cx="150" cy="150" r="12" fill="white"/>
  
  <!-- Connecting lines -->
  <line x1="150" y1="100" x2="150" y2="138" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="160" y1="160" x2="200" y2="170" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="140" y1="160" x2="100" y2="170" stroke="white" stroke-width="3" opacity="0.7"/>
  
  <!-- Text label -->
  <text x="150" y="260" font-family="Arial" font-size="16" fill="white" text-anchor="middle" opacity="0.8">React Design</text>
</svg>
