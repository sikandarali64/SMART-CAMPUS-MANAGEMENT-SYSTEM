<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#avatarGrad)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="30" fill="white"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="35" ry="45" fill="white"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="65" r="4" fill="#5b21b6"/>
  <circle cx="110" cy="65" r="4" fill="#5b21b6"/>
  
  <!-- Smile -->
  <path d="M 90 75 Q 100 80 110 75" stroke="#5b21b6" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="40" r="8" fill="white" opacity="0.3"/>
  <circle cx="170" cy="160" r="10" fill="white" opacity="0.2"/>
</svg>
